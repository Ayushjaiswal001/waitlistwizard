<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaitlistWizard — Build viral waitlists</title>
  <meta name="description" content="Create stunning waitlist pages with referral mechanics. Build buzz before you launch." />
  <meta name="theme-color" content="#FAFAF8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta property="og:title" content="WaitlistWizard" />
  <meta property="og:description" content="Build viral waitlist pages with referral mechanics." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FAFAF8;
      --bg-surface: #FFFFFF;
      --bg-input: #F3F1EF;
      --text-main: #242220;
      --text-muted: #6B6862;
      --accent: #7a54ff;
      --border: rgba(36,34,32,0.06);
      --font-display: 'Instrument Serif', serif;
      --font-body: 'General Sans', sans-serif;
    }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image: 
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
    }
    a { color: inherit; text-decoration: none; }
  </style>
  <link rel="stylesheet" href="/css/dashboard.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
</head>
<body>
  <div id="app">
    <div class="boot-loader">
      <span class="boot-logo">✨</span>
      <div class="boot-spinner"></div>
    </div>
  </div>
  <style>
    .boot-loader{display:flex;flex-direction:column;align-items:center;
      justify-content:center;height:100vh;background:#FAFAF8;gap:20px}
    .boot-logo{font-size:48px}
    .boot-spinner{width:36px;height:36px;border:4px solid
      rgba(122,84,255,0.15);border-top-color:#7a54ff;border-radius:50%;
      animation:boot-spin 0.8s ease infinite}
    @keyframes boot-spin{to{transform:rotate(360deg)}}
  </style>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
