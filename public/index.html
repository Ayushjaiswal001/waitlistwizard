<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaitlistWizard — Build viral waitlists</title>
  <meta name="description" content="Create stunning waitlist pages with referral mechanics. Build buzz before you launch." />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="robots" content="noindex, nofollow" />
  <meta property="og:title" content="WaitlistWizard" />
  <meta property="og:description" content="Build viral waitlist pages with referral mechanics." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0b;
      --bg-surface: #111113;
      --bg-input: #141416;
      --text-main: #f0ede6;
      --text-muted: #888888;
      --accent: #c8ff00;
      --border: rgba(255,255,255,0.08);
      --font-display: 'Instrument Serif', serif;
      --font-body: 'General Sans', sans-serif;
    }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }
    a { color: inherit; text-decoration: none; }
  </style>
  <link rel="stylesheet" href="/css/dashboard.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
</head>
<body>
  <div id="app">
    <div class="boot-loader">
      <span class="boot-logo">⚡</span>
      <div class="boot-spinner"></div>
    </div>
  </div>
  <style>
    .boot-loader{display:flex;flex-direction:column;align-items:center;
      justify-content:center;height:100vh;background:#0a0a0f;gap:20px}
    .boot-logo{font-size:40px}
    .boot-spinner{width:28px;height:28px;border:3px solid
      rgba(167,139,250,0.2);border-top-color:#a78bfa;border-radius:50%;
      animation:boot-spin 0.75s linear infinite}
    @keyframes boot-spin{to{transform:rotate(360deg)}}
  </style>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
